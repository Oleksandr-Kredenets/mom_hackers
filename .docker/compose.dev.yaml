services:
  # valhalla:
  #   image: hackathon-valhalla
  #   build:
  #     context: ..
  #     dockerfile: ./.docker/Dockerfile.valhalla
  #   env_file:
  #     - ../.env
  #   networks:
  #     - internal
  #     - default
  #   ports:
  #     - 127.0.0.1:8002:8002
  #   volumes:
  #     - ${VALHALLA_PERSISTENT_DIR_LOCAL}:/data

  database:
    image: postgres:14.22
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - internal
    volumes:
      - ${POSTGRES_PERSISTENT_DIR_LOCAL}:/var/lib/postgresql/data

  back:
    image: hackathon-back
    build:
      context: ..
      dockerfile: ./.docker/Dockerfile.back
    env_file:
      - ../.env
    volumes:
      - ${FUEL_PRICE_CSV_PATH}:/data
    networks:
      - internal
    # TEMP

      - default
    ports:
      - 127.0.0.1:5000:8080
    
    # END TEMP
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      # - valhalla
      - database

  front:
    image: hackathon-front
    build:
      context: ..
      dockerfile: ./.docker/Dockerfile.front
    env_file:
      - ../.env
    ports:
      - 127.0.0.1:${FRONTEND_PORT}:80
    networks:
      - default
      - internal
    depends_on:
      - back

  # fuel-prices:
