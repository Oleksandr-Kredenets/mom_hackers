# Run (from repository root):
#   docker compose -f .docker/compose.dev.yaml --env-file .\.env up --build

services:
  # valhalla:
  #   image: valhalla/valhalla:run-latest
  #   build:
  #     context: ..
  #     dockerfile: ./.docker/Dockerfile.valhalla
  #   networks:
  #     - internal
  #   volumes:
  #     - ${VALHALLA_PERSISTENT_DIR_LOCAL}:/data

  database:
    image: postgres:14.22
    env_file:
      - ../.env
  #   environment:
  #     - POSTGRES_USER=${POSTGRES_USER}
  #     - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
  #     - POSTGRES_DB=${POSTGRES_DB}
    networks:
      - internal
    volumes:
      - ${POSTGRES_PERSISTENT_DIR_LOCAL}:/var/lib/postgresql/data

  back:
    image: hackathon-back
    build:
      context: ..
      dockerfile: ./.docker/Dockerfile.back
    env_file:
      - ../.env
    volumes:
      - ${FUEL_PRICE_CSV_PATH}:/data
    networks:
      - internal
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      # - valhalla
      - database

  front:
    image: hackathon-front
    build:
      context: ..
      dockerfile: ./.docker/Dockerfile.front
    env_file:
      - ../.env
    ports:
      - 127.0.0.1:${FRONTEND_PORT}:80
    networks:
      - default
      - internal
    depends_on:
      - back

  fuel-prices:
    image: python:3.11-alpine
    command: sh -c "echo '0 0 * * * /usr/local/bin/python /data/scrape_fuel_prices.py' > /var/spool/cron/crontabs/root && crond -f -l 2"
    volumes:
      - ${FUEL_PRICE_CSV_PATH}:/data

networks:
  internal:
    driver: bridge
    internal: true